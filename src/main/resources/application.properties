# ===================================
# JWT CONFIG
# ===================================
jwt.secret=tse-erp-super-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

# 900000ms   = 15 minutes (access token)
# 604800000ms = 7 days (refresh token)

# ===================================
# SECURITY CONFIG
# ===================================
security.rate-limit.max-attempts-per-ip=5
